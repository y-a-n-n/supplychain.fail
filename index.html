<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supply Chain CVE Timeline</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f1115; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        select { color-scheme: dark; }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen flex flex-col justify-between">

    <header class="mb-4 max-w-6xl mx-auto w-full flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-xl font-bold tracking-tight text-white">SUPPLY_CHAIN_CVE_MATRIX</h1>
            <p class="text-xs text-gray-400 mt-1">Weekly aggregate layout of registry vulnerabilities sorted by peak CVSS severity profiles.</p>
        </div>
        <div class="flex items-center gap-2">
            <label for="timeframe" class="text-xs text-gray-500 font-bold">TIMEFRAME:</label>
            <select id="timeframe" class="bg-[#14171f] text-xs text-gray-300 font-mono border border-gray-800 rounded px-3 py-1.5 focus:outline-none focus:border-red-500 cursor-pointer">
                <option value="last12" selected>Last 12 Months</option>
                <option value="2026">2026 Grid</option>
                <option value="2025">2025 Grid</option>
                <option value="2024">2024 Grid</option>
                <option value="2023">2023 Grid</option>
            </select>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full flex items-center justify-center">
        <div id="timeline-chart" class="w-full h-[480px] bg-[#14171f] rounded-lg border border-gray-800 p-2 md:p-4"></div>
    </main>

    <footer class="mt-6 text-center text-[10px] text-gray-500 max-w-6xl mx-auto w-full border-t border-gray-900 pt-4">
        Data updated automatically via GitHub Actions from the open-source OSV Advisory Engine database. Touch-drag or scroll to pan data on narrow screens.
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const chartDom = document.getElementById('timeline-chart');
            const timeframeSelector = document.getElementById('timeframe');
            const myChart = echarts.init(chartDom, 'dark');
            
            let globalDataset = null;

            // Strict Timezone-Agnostic UTC Sunday normalizer
            function getSundayStartString(dateInput) {
                if (!dateInput) return null;
                // Force date format to parse cleanly as plain UTC midnight
                const cleanInput = dateInput.includes('T') ? dateInput.split('T')[0] : dateInput;
                const d = new Date(cleanInput + 'T00:00:00Z');
                if (isNaN(d.getTime())) return null;
                
                const day = d.getUTCDay();
                d.setUTCDate(d.getUTCDate() - day);
                return d.toISOString().split('T')[0];
            }

            // Generate chronological sequence array of week-start strings
            function generateTimelineWeeks(filterMode) {
                const weeks = [];
                let startAnchor, endAnchor;

                // Grab current absolute UTC date string
                const now = new Date();
                const todayStr = now.toISOString().split('T')[0];

                if (filterMode === 'last12') {
                    const endStr = getSundayStartString(todayStr);
                    endAnchor = new Date(endStr + 'T00:00:00Z');
                    startAnchor = new Date(endAnchor.getTime());
                    startAnchor.setUTCDate(startAnchor.getUTCDate() - (51 * 7)); // 52 weeks total
                } else {
                    const targetYear = parseInt(filterMode);
                    startAnchor = new Date(getSundayStartString(`${targetYear}-01-01`) + 'T00:00:00Z');
                    endAnchor = new Date(getSundayStartString(`${targetYear}-12-31`) + 'T00:00:00Z');
                }

                let current = new Date(startAnchor.getTime());
                while (current <= endAnchor) {
                    weeks.push(current.toISOString().split('T')[0]);
                    current.setUTCDate(current.getUTCDate() + 7);
                }
                return weeks;
            }

            function renderMatrixChart(timeframeFilter) {
                if (!globalDataset) return;

                const ecosystems = globalDataset.meta.ecosystems;
                const activeTimelineWeeks = generateTimelineWeeks(timeframeFilter);

                // Step 1: Populate hash map buckets for dataset entries
                const metricsHashMap = {};
                
                globalDataset.data.forEach(item => {
                    const rawDate = item[0];
                    const ecosystemIndex = item[1];
                    const severityScore = item[2];
                    const advisoryId = item[3] || 'N/A';

                    const weekGroupKey = getSundayStartString(rawDate);
                    const bucketCompositeKey = `${weekGroupKey}_${ecosystemIndex}`;

                    if (activeTimelineWeeks.includes(weekGroupKey)) {
                        if (!metricsHashMap[bucketCompositeKey]) {
                            metricsHashMap[bucketCompositeKey] = {
                                maxSeverity: severityScore,
                                alertCount: 1,
                                trackingIds: [advisoryId]
                            };
                        } else {
                            if (severityScore > metricsHashMap[bucketCompositeKey].maxSeverity) {
                                metricsHashMap[bucketCompositeKey].maxSeverity = severityScore;
                            }
                            metricsHashMap[bucketCompositeKey].alertCount += 1;
                            if (metricsHashMap[bucketCompositeKey].trackingIds.length < 3 && !metricsHashMap[bucketCompositeKey].trackingIds.includes(advisoryId)) {
                                metricsHashMap[bucketCompositeKey].trackingIds.push(advisoryId);
                            }
                        }
                    }
                });

                // Step 2: Build coordinate maps matching visual array layout matrix
                const matrixSeriesData = [];
                
                activeTimelineWeeks.forEach((weekStr, weekIndex) => {
                    ecosystems.forEach((ecoName, ecoIndex) => {
                        const searchKey = `${weekStr}_${ecoIndex}`;
                        
                        if (metricsHashMap[searchKey]) {
                            const node = metricsHashMap[searchKey];
                            matrixSeriesData.push([
                                weekIndex, 
                                ecoIndex, 
                                node.maxSeverity, 
                                node.alertCount, 
                                node.trackingIds.join(', '),
                                weekStr
                            ]);
                        } else {
                            // Value -1 explicitly signals an empty grid node to the visual map
                            matrixSeriesData.push([weekIndex, ecoIndex, -1, 0, '', weekStr]);
                        }
                    });
                });

                // Step 3: Construct refined responsive chart options
                const option = {
                    backgroundColor: 'transparent',
                    tooltip: {
                        position: 'top',
                        formatter: (params) => {
                            const count = params.value[3];
                            if (count === 0) {
                                return `<div class="p-1 font-mono text-xs text-gray-400">
                                    <strong>Week of:</strong> ${params.value[5]}<br/>
                                    <strong>Registry:</strong> ${ecosystems[params.value[1]]}<br/>
                                    <span>No reported vulnerabilities</span>
                                </div>`;
                            }
                            return `<div class="p-1 font-mono text-xs">
                                <strong>Week of:</strong> ${params.value[5]}<br/>
                                <strong>Registry:</strong> ${ecosystems[params.value[1]]}<br/>
                                <strong>Volume:</strong> ${count} CVE(s)<br/>
                                <strong>Peak Severity:</strong> <span class="text-red-400 font-bold">${params.value[2]}</span><br/>
                                <span class="text-gray-400 text-[10px] mt-1 block max-w-[240px] truncate">Samples: ${params.value[4]}</span>
                            </div>`;
                        }
                    },
                    // Add defensive padding layouts on the left/bottom bounds to stop label clipping
                    grid: { left: '70', right: '15', top: '50', bottom: '40', containLabel: false },
                    xAxis: {
                        type: 'category',
                        data: activeTimelineWeeks,
                        axisLine: { show: false },
                        axisTick: { show: false },
                        axisLabel: {
                            interval: 0, // CRITICAL: Tells ECharts to process every week instead of skipping headers
                            margin: 14,
                            textStyle: { color: '#8c9ba5', fontSize: 10, fontFamily: 'monospace' },
                            formatter: function (value) {
                                const d = new Date(value + 'T00:00:00Z');
                                // Only emit month name headers on the first week of a month block
                                if (d.getUTCDate() <= 7) {
                                    return d.toLocaleString('default', { month: 'short', timeZone: 'UTC' }).toUpperCase();
                                }
                                return '';
                            }
                        }
                    },
                    yAxis: {
                        type: 'category',
                        data: ecosystems,
                        axisLine: { show: false },
                        axisTick: { show: false },
                        axisLabel: { 
                            margin: 14, 
                            textStyle: { color: '#e2e8f0', fontWeight: 'bold', fontSize: 11, fontFamily: 'monospace' } 
                        }
                    },
                    visualMap: {
                        type: 'piecewise',
                        orient: 'horizontal',
                        left: 'center',
                        top: 10,
                        itemWidth: 10,
                        itemHeight: 10,
                        itemGap: 15,
                        textStyle: { color: '#94a3b8', fontSize: 10, fontFamily: 'monospace' },
                        pieces: [
                            { value: -1, label: 'None', color: '#1e2330' }, // Noticeable GitHub empty grid color
                            { min: 0.0, max: 3.9, label: 'Low', color: '#fee2e2' }, 
                            { min: 4.0, max: 6.9, label: 'Mid', color: '#fca5a5' },
                            { min: 7.0, max: 8.9, label: 'High', color: '#dc2626' },
                            { min: 9.0, max: 10.0, label: 'Critical', color: '#7f1d1d' } 
                        ]
                    },
                    // Enables seamless touch panning/scrolling right inside the graph on mobile layouts
                    dataZoom: [
                        {
                            type: 'inside',
                            xAxisIndex: 0,
                            zoomOnMouseWheel: false, // Prevents page scroll interference on desktop
                            moveOnMouseMove: true,
                            moveOnTouch: true
                        }
                    ],
                    series: [{
                        type: 'heatmap',
                        data: matrixSeriesData,
                        label: { show: false },
                        itemStyle: {
                            borderColor: '#14171f',
                            borderWidth: 2,
                            borderRadius: 2
                        }
                    }]
                };

                myChart.setOption(option, true);
            }

            try {
                const response = await fetch('data.json');
                globalDataset = await response.json();
                
                renderMatrixChart(timeframeSelector.value);

                timeframeSelector.addEventListener('change', (e) => {
                    renderMatrixChart(e.target.value);
                });

                window.addEventListener('resize', () => myChart.resize());

            } catch (error) {
                chartDom.innerHTML = `<div class="flex items-center justify-center h-full text-red-400 text-xs font-mono">Error loading dataset: Check data.json existence.</div>`;
                console.error(error);
            }
        });
    </script>
</body>
</html>
