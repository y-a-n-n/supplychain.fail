name: Daily CVE Data Sync

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4

      - name: Shallow Clone GitHub Advisory DB
        run: git clone --depth 1 https://github.com/github/advisory-database.git advisories

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate Optimized JSON Dataset
        run: python build_data.py

      - name: Purge Heavy Clone Folder
        run: rm -rf advisories

      - name: Commit and Push to Main Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update vulnerability dataset"
            git push
          fi